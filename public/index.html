<!doctype html>
<html lang="en">
  <head>
    <title>Bad Messaging App</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/index.js" type="text/javascript"></script>
  </head>

  <body>
    <header class="app-header">
      <p class="app-header__label">REAL-TIME COMMUNICATION*</p>
      <h1>Bad Messaging App</h1>
      <p class="app-header__tagline">you cant say i didnt warn you</p>
    </header>

    <div id="message-send">
      <div class="send-heading-row">
        <h2 class="send-heading">Send Mes<span class="send-heading__leaning">s</span><span class="send-heading__fallen">age</span></h2>
        <p
          id="connection-status"
          class="connection-status"
          data-state="connecting"
          role="status"
          aria-live="polite"
        >
          Connecting…
        </p>
      </div>
      <form id="message-send-form">
        <div class="form-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" />
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>
        </div>

        <button type="submit" disabled>Send it</button>
      </form>
    </div>
    <section id="message-viewer" aria-labelledby="messages-heading">
      <h2 id="messages-heading">Messages <span class="messages-heading__aside">(unfortunately)</span></h2>
      <p
        id="message-status"
        class="message-status"
        data-state="loading"
        role="status"
        aria-live="polite"
      >
        Loading messages…
      </p>
      <div id="message-list"></div>
      <button id="load-older" class="load-older" type="button" hidden>
        Load older messages
      </button>
    </section>
  </body>
</html>
